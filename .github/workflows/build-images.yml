name: build-images

on:
  push:
    branches: [master, main, dev/build-workflow]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (blank = git describe)'
        required: false
        default: ''
      push:
        description: 'Push to registry'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/calicovpp

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git describe needs full history

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(git describe --always --abbrev=40 --dirty)
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}"

      - name: Build VPP tarball (from source)
        # vpp-manager/Makefile の image target は VPP の tarball を要求する。
        # 本家 CI は S3 キャッシュから取るが、ここでは源からビルドする。
        # calicovpp/vpp-build イメージが両 arch 対応していることを前提とする。
        run: make -C vpp-manager vpp
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Build calicovpp/vpp image
        run: make -C vpp-manager vpp-image
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Build calicovpp/agent image
        run: make -C calico-vpp-agent image
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Tag and push per-arch images
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ARCH=${{ matrix.arch }}
          for component in vpp agent; do
            remote=${REGISTRY}/${IMAGE_NAMESPACE}/${component}:${TAG}-${ARCH}
            docker tag calicovpp/${component}:${TAG} ${remote}
            docker push ${remote}
            echo "pushed ${remote}"
          done

  manifest:
    needs: build
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || inputs.push)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(git describe --always --abbrev=40 --dirty)
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for component in vpp agent; do
            base=${REGISTRY}/${IMAGE_NAMESPACE}/${component}
            docker buildx imagetools create \
              -t ${base}:${TAG} \
              ${base}:${TAG}-amd64 \
              ${base}:${TAG}-arm64

            # master branch の push / v* tag では latest も更新
            if [ "${{ github.ref }}" = "refs/heads/master" ] || \
               [ "${{ github.ref }}" = "refs/heads/main" ] || \
               [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
              docker buildx imagetools create \
                -t ${base}:latest \
                ${base}:${TAG}-amd64 \
                ${base}:${TAG}-arm64
            fi
          done
