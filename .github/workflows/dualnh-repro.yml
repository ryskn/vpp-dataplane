# Reproduces Finding #1 (BGP MP_REACH_NLRI dual-nexthop -> calico-vpp-agent
# os.Exit) on Linux. Runs both the "current behavior" assertion (must crash)
# and the "fixed behavior" assertion (must succeed) so the same workflow
# clearly reports before/after a fix.
name: dualnh-repro

on:
  push:
    branches: ["**"]
    paths:
      - "calico-vpp-agent/routing/**"
      - ".github/workflows/dualnh-repro.yml"
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (sanity)
        working-directory: calico-vpp-agent
        run: go build ./routing/...

      - name: Reproduce current (buggy) behavior — expect child crash
        id: buggy
        working-directory: calico-vpp-agent
        continue-on-error: true
        run: go test -count=1 -v -run TestDualNexthopReproduction ./routing/

      - name: Verify fixed behavior — expect child clean exit
        id: fixed
        working-directory: calico-vpp-agent
        continue-on-error: true
        env:
          WANT_FIXED: "1"
        run: go test -count=1 -v -run TestDualNexthopReproduction ./routing/

      - name: Outcome summary
        if: always()
        env:
          BUGGY: ${{ steps.buggy.outcome }}
          FIXED: ${{ steps.fixed.outcome }}
        run: |
          echo "buggy-mode step: $BUGGY"
          echo "fixed-mode step: $FIXED"
          if [ "$BUGGY" = "success" ] && [ "$FIXED" = "failure" ]; then
            echo "→ Bug is present and reproducible. Fix is not yet applied."
            exit 0
          fi
          if [ "$BUGGY" = "failure" ] && [ "$FIXED" = "success" ]; then
            echo "→ Fix is applied and verified. Bug repro test now (correctly) reports the bug as gone."
            exit 0
          fi
          if [ "$BUGGY" = "success" ] && [ "$FIXED" = "success" ]; then
            echo "→ Inconsistent: both modes passed. Test logic likely needs updating."
            exit 1
          fi
          echo "→ Both modes failed: investigate (test setup, dependency drift, or unexpected behavior)."
          exit 1
